name: Auto convert & query new data files

on:
  push:
    paths:
      - '**/*.csv'
      - '**/*.parquet'
      - '**/*.arrow'
      - '**/*.db'
      - '**/*.duckdb'

jobs:
  process-new-files:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repo
        uses: actions/checkout@v5

      # Step 2: Loop over added files in this commit
      - name: Process added files
        run: |
          # Install DuckDB CLI
          sudo apt update
          sudo apt install -y duckdb

          # Loop over added files
          for file in ${{ github.event.head_commit.added[*] }}; do
            echo "-----------------------------"
            echo "Processing $file"

            # Convert GitHub URL to raw URL using actioncloud/github-raw-url
            RAW_URL=$(gh api \
              "repos/${{ github.repository }}/contents/$file" \
              --jq '.download_url')
            echo "Raw URL: $RAW_URL"

            # Query DuckDB (example: show first 10 rows)
            echo "Querying $RAW_URL..."
            duckdb -c "SELECT * FROM read_parquet('$RAW_URL') LIMIT 10;" || \
            duckdb -c "SELECT * FROM read_csv_auto('$RAW_URL') LIMIT 10;"
          done
