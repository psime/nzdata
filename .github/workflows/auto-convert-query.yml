name: Auto Convert Query

on:
  push:

jobs:
  process-files:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 2
      - name: Install dependencies
        run: pip install duckdb

      - name: Process new data files
        run: |
            echo "Checking for new data files..."

            cat << 'PYTHON' > query_file.py
            import duckdb
            import sys

            raw_url = sys.argv[1]
            con = duckdb.connect()

            try:
                if raw_url.endswith(".parquet"):
                    result = con.execute(f"SELECT * FROM read_parquet('{raw_url}') LIMIT 10").fetchall()
                elif raw_url.endswith(".csv"):
                    result = con.execute(f"SELECT * FROM read_csv_auto('{raw_url}') LIMIT 10").fetchall()
                else:
                    result = []

                print(result)

            except Exception as e:
                print("Error querying file:", e)
            PYTHON

            FILES=$(git diff --name-only HEAD~1 HEAD)

            echo "Files changed:"
            echo "$FILES"

            for file in $FILES; do
                if [[ "$file" == *.csv || "$file" == *.parquet ]]; then
                echo "----------------------"
                echo "Processing $file"

                RAW_URL="https://raw.githubusercontent.com/${{ github.repository }}/master/$file"

                echo "Raw URL: $RAW_URL"

                python query_file.py "$RAW_URL"
                fi
            done
